<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pata y Aleta | Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
:root{--navy:#071426;--teal:#007A8C;--aqua:#46C1CD;--muted:#64748B;--shadow:0 24px 70px rgba(13,27,42,.14)}
*{box-sizing:border-box}body{margin:0;font-family:Montserrat,Arial,sans-serif;background:#F6FAFB;color:var(--navy)}img,video{max-width:100%;display:block}
.login{min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(135deg,#06111f,#0D1B2A 55%,#007A8C);color:white}.box{width:min(560px,100%);background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.24);border-radius:32px;padding:28px;box-shadow:0 32px 90px rgba(0,0,0,.34);backdrop-filter:blur(14px)}.logo{width:260px;max-width:100%;margin:0 auto 16px;background:white;border-radius:24px;padding:12px}h1{font-size:40px;line-height:1;margin:0 0 10px;font-weight:950;letter-spacing:-.05em}.login h1{text-align:center}.login p{text-align:center;color:#EAF7F9}
input,select,textarea{width:100%;border:1px solid #d7dde5;border-radius:16px;padding:13px 14px;font-family:inherit;font-size:15px;background:white}textarea{min-height:100px}label{font-size:13px;font-weight:900;color:#334155;display:block;margin:8px 0 6px}.login label{color:#fff}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,var(--teal),#075B6B);color:white;border:0;border-radius:999px;padding:13px 20px;font-weight:950;box-shadow:0 14px 30px rgba(0,122,140,.24);cursor:pointer;font-family:inherit;text-decoration:none}.btn.full{width:100%;margin-top:12px}.btn.secondary{background:#e2e8f0;color:#0D1B2A;box-shadow:none}.error{background:#fee2e2;color:#991b1b;padding:12px;border-radius:16px;margin:10px 0}.ok{background:#dcfce7;color:#166534;padding:12px;border-radius:16px;margin:10px 0}.notice{background:rgba(255,255,255,.13);padding:12px;border-radius:16px;margin-top:12px}
header{position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(18px);border-bottom:1px solid rgba(0,122,140,.14);z-index:10}.nav{max-width:1220px;margin:auto;padding:12px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{display:flex;align-items:center;gap:12px}.brand img{width:100px}.brand strong{font-size:22px;font-weight:950}.brand span{color:var(--teal)}
main{max-width:1220px;margin:auto;padding:28px 22px}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin:20px 0}.tab{border:0;background:white;border-radius:999px;padding:12px 18px;font-weight:900;cursor:pointer;box-shadow:0 10px 24px rgba(13,27,42,.07)}.tab.active{background:linear-gradient(135deg,var(--teal),var(--aqua));color:white}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:22px}.card{background:white;border-radius:28px;padding:22px;box-shadow:var(--shadow);border:1px solid rgba(0,122,140,.10)}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.span2{grid-column:1/-1}.checks{display:flex;gap:14px;flex-wrap:wrap;margin:14px 0}.checks label{display:flex;align-items:center;gap:8px;margin:0;color:#334155}.checks input{width:auto}.upload{border:1px dashed var(--teal);background:#F4FAFB;border-radius:16px;padding:14px;margin:8px 0}.upload input{background:transparent;border:0;padding:0}
.list{display:grid;gap:12px;margin-top:16px}.item{display:grid;grid-template-columns:82px 1fr auto;gap:12px;align-items:center;background:white;border-radius:18px;padding:12px;box-shadow:0 10px 24px rgba(13,27,42,.08)}.item img,.item video{width:82px;height:68px;object-fit:cover;border-radius:14px}.item small{color:var(--muted)}
.productgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.product{background:white;border-radius:24px;overflow:hidden;box-shadow:0 12px 30px rgba(13,27,42,.10)}.product img,.product video{width:100%;height:200px;object-fit:cover}.product div{padding:16px}.price{color:var(--teal);font-weight:950}.pill{display:inline-flex;border-radius:999px;background:#EAF7F9;color:var(--teal);font-size:12px;font-weight:950;padding:7px 10px;margin-bottom:8px}
@media(max-width:900px){.grid,.formgrid,.productgrid{grid-template-columns:1fr}.item{grid-template-columns:70px 1fr}.brand strong{font-size:18px}}
</style>
</head>
<body><div id="app"></div>
<script>
const DEFAULT_URL="https://vjyktubsdhpusyvnphvj.supabase.co",WA="5215514933535",ADMIN_CODE="Misraim2026";let sb=null;let state={session:null,codeOk:localStorage.getItem("pata_code_ok")==="yes",tab:"products",products:[],gallery:[],configOk:false,loaded:false};
const $=s=>document.querySelector(s);function wa(t){return "https://wa.me/"+WA+"?text="+encodeURIComponent(t)}function cfg(){return{url:localStorage.getItem("pata_supabase_url")||DEFAULT_URL,key:localStorage.getItem("pata_supabase_key")||""}}function setClient(){const c=cfg();if(!c.key){state.configOk=false;return false}sb=window.supabase.createClient(c.url.replace(/\/rest\/v1\/?$/,""),c.key);state.configOk=true;return true}
async function init(){setClient();if(sb){let {data}=await sb.auth.getSession();state.session=data.session;sb.auth.onAuthStateChange((_e,s)=>{state.session=s;render()})}render()}
function logo(){return '<img class="logo" src="/logo-pata-y-aleta.png" onerror="this.style.display=\'none\'">'}
function render(){if(!state.configOk)return app.innerHTML=configScreen();if(false&&!state.session)return app.innerHTML=loginScreen();;if(false&&!state.codeOk)return app.innerHTML=codeScreen();app.innerHTML=adminScreen();loadData()}
function configScreen(){return `<div class="login"><div class="box">${logo()}<h1>Conectar Admin</h1><p>Pega tu Publishable key de Supabase una vez en este navegador.</p><label>Supabase URL</label><input id="cfgUrl" value="${cfg().url}"><label>Supabase Publishable key</label><input id="cfgKey" placeholder="sb_publishable_..."><button class="btn full" onclick="saveConfig()">Guardar conexión</button><div class="notice">La URL correcta no lleva /rest/v1.</div></div></div>`}
function saveConfig(){let url=$("#cfgUrl").value.trim().replace(/\/rest\/v1\/?$/,""),key=$("#cfgKey").value.trim();if(!url||!key)return alert("Falta URL o key");localStorage.setItem("pata_supabase_url",url);localStorage.setItem("pata_supabase_key",key);setClient();render()}
function loginScreen(){return `<div class="login"><div class="box">${logo()}<h1>Panel Admin</h1><p>Acceso por correo + código interno.</p><label>Correo</label><input id="email" type="email" placeholder="tu@correo.com"><button class="btn full" onclick="sendMagic()">Enviar acceso por correo</button><button class="btn secondary full" onclick="resetConfig()">Cambiar Supabase key</button><div id="msg"></div><a style="color:white;display:block;text-align:center;margin-top:18px" href="/">Volver</a></div></div>`}
async function sendMagic(){let email=$("#email").value.trim();if(!email)return alert("Escribe tu correo");let {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:location.origin+"/admin/"}});$("#msg").innerHTML=error?`<div class="error">${error.message}</div>`:`<div class="ok">Listo. Revisa tu correo y abre Sign in.</div>`}
function codeScreen(){return `<div class="login"><div class="box">${logo()}<h1>Código interno</h1><p>Escribe el código del equipo.</p><input id="code" type="password" placeholder="Código interno"><button class="btn full" onclick="checkCode()">Entrar</button><button class="btn secondary full" onclick="logout()">Salir</button></div></div>`}
function checkCode(){if($("#code").value===ADMIN_CODE){localStorage.setItem("pata_code_ok","yes");state.codeOk=true;render()}else alert("Código incorrecto")}async function logout(){localStorage.removeItem("pata_code_ok");state.codeOk=false;await sb.auth.signOut();render()}function resetConfig(){localStorage.removeItem("pata_supabase_key");localStorage.removeItem("pata_supabase_url");location.reload()}
function adminScreen(){return `<header><div class="nav"><div class="brand"><img src="/logo-pata-y-aleta.png"><div><strong>PATA <span>Y ALETA</span></strong><br><small>Admin catálogo vivo</small></div></div><div><a class="btn secondary" href="/">Ver web</a> <button class="btn" onclick="logout()">Salir</button></div></div></header><main><h1>Panel Admin Pata y Aleta</h1><p>Sube fotos, videos, peces, accesorios, antes/después y promociones.</p><div class="tabs"><button class="tab ${state.tab==='products'?'active':''}" onclick="state.tab='products';render()">Catálogo</button><button class="tab ${state.tab==='gallery'?'active':''}" onclick="state.tab='gallery';render()">Galería / videos</button><button class="tab ${state.tab==='preview'?'active':''}" onclick="state.tab='preview';render()">Vista pública</button></div>${state.tab==='products'?productsUI():state.tab==='gallery'?galleryUI():previewUI()}</main>`}
function productsUI(){return `<div class="grid"><div class="card"><h2>Agregar producto</h2><div class="formgrid"><div><label>Nombre</label><input id="pTitle"></div><div><label>Categoría</label><select id="pCat"><option value="peces_marinos">Peces marinos</option><option value="accesorios_acuario">Accesorios acuario</option><option value="accesorios_mascotas">Accesorios mascotas</option><option value="corales">Corales</option><option value="alimento">Alimento</option><option value="filtros">Filtros</option><option value="promociones">Promociones</option></select></div><div class="span2"><label>Descripción</label><textarea id="pDesc"></textarea></div><div><label>Precio numérico opcional</label><input id="pPrice"></div><div><label>Texto precio</label><input id="pLabel" value="Cotizar"></div><div><label>Status</label><select id="pStatus"><option>disponible</option><option>agotado</option><option>proximamente</option></select></div><div><label>Orden</label><input id="pOrder" value="0"></div></div><div class="checks"><label><input id="pShow" type="checkbox"> Mostrar precio</label><label><input id="pFeat" type="checkbox"> Destacado</label><label><input id="pPub" type="checkbox" checked> Publicado</label></div><div class="upload"><label>Foto</label><input id="pImg" type="file" accept="image/*"></div><div class="upload"><label>Video</label><input id="pVid" type="file" accept="video/*"></div><button class="btn full" onclick="saveProduct()">Publicar producto</button><div id="pMsg"></div></div><div class="card"><h2>Productos publicados</h2><div id="productList" class="list"></div></div></div>`}
async function upload(bucket,file,folder){let ext=file.name.split(".").pop(),path=`${folder}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;let {error}=await sb.storage.from(bucket).upload(path,file,{upsert:true});if(error)throw error;return sb.storage.from(bucket).getPublicUrl(path).data.publicUrl}
async function saveProduct(){let msg=$("#pMsg");msg.innerHTML="Guardando...";try{let image_url="",video_url="";if($("#pImg").files[0])image_url=await upload("pata-products",$("#pImg").files[0],"images");if($("#pVid").files[0])video_url=await upload("pata-products",$("#pVid").files[0],"videos");let payload={title:$("#pTitle").value,category:$("#pCat").value,description:$("#pDesc").value,price:$("#pPrice").value?Number($("#pPrice").value):null,price_label:$("#pLabel").value,show_price:$("#pShow").checked,status:$("#pStatus").value,featured:$("#pFeat").checked,published:$("#pPub").checked,sort_order:Number($("#pOrder").value||0),image_url,video_url};let {error}=await sb.from("products").insert(payload);if(error)throw error;msg.innerHTML='<div class="ok">Producto publicado.</div>';loadData(true)}catch(e){msg.innerHTML='<div class="error">'+e.message+"</div>"}}
async function delProduct(id){if(!confirm("¿Eliminar producto?"))return;await sb.from("products").delete().eq("id",id);loadData(true)}
function galleryUI(){return `<div class="grid"><div class="card"><h2>Agregar galería</h2><div class="formgrid"><div><label>Título</label><input id="gTitle"></div><div><label>Tipo</label><select id="gType"><option>antes_despues</option><option>instalacion</option><option>rescate</option><option>boutique</option><option>video</option><option>testimonio</option></select></div><div class="span2"><label>Descripción</label><textarea id="gDesc"></textarea></div></div><div class="upload"><label>Foto principal</label><input id="gMedia" type="file" accept="image/*"></div><div class="upload"><label>Antes</label><input id="gBefore" type="file" accept="image/*"></div><div class="upload"><label>Después</label><input id="gAfter" type="file" accept="image/*"></div><div class="upload"><label>Video</label><input id="gVideo" type="file" accept="video/*"></div><button class="btn full" onclick="saveGallery()">Guardar galería</button><div id="gMsg"></div></div><div class="card"><h2>Galería publicada</h2><div id="galleryList" class="list"></div></div></div>`}
async function saveGallery(){let msg=$("#gMsg");msg.innerHTML="Guardando...";try{let payload={title:$("#gTitle").value,type:$("#gType").value,description:$("#gDesc").value,published:true};if($("#gMedia").files[0])payload.media_url=await upload("pata-gallery",$("#gMedia").files[0],"media");if($("#gBefore").files[0])payload.before_url=await upload("pata-gallery",$("#gBefore").files[0],"before");if($("#gAfter").files[0])payload.after_url=await upload("pata-gallery",$("#gAfter").files[0],"after");if($("#gVideo").files[0])payload.video_url=await upload("pata-gallery",$("#gVideo").files[0],"video");let {error}=await sb.from("gallery").insert(payload);if(error)throw error;msg.innerHTML='<div class="ok">Galería guardada.</div>';loadData(true)}catch(e){msg.innerHTML='<div class="error">'+e.message+"</div>"}}
async function delGallery(id){if(!confirm("¿Eliminar galería?"))return;await sb.from("gallery").delete().eq("id",id);loadData(true)}
function catLabel(c){return({peces_marinos:"🐠 Peces marinos",accesorios_acuario:"🔧 Acc. acuario",accesorios_mascotas:"🐶 Acc. mascotas",corales:"🪸 Corales",alimento:"🥫 Alimento",filtros:"⚙️ Filtros",promociones:"🔥 Promociones"}[c]||c)}
async function loadData(force=false){if(!sb||(!force&&state.loaded))return;let[p,g]=await Promise.all([sb.from("products").select("*").order("created_at",{ascending:false}),sb.from("gallery").select("*").order("created_at",{ascending:false})]);state.products=p.data||[];state.gallery=g.data||[];state.loaded=true;let pl=$("#productList");if(pl)pl.innerHTML=state.products.map(i=>`<div class="item">${i.video_url?`<video src="${i.video_url}"></video>`:`<img src="${i.image_url||'/logo-pata-y-aleta.png'}">`}<div><b>${i.title}</b><small>${catLabel(i.category)} · ${i.published?'Publicado':'Oculto'} · ${i.status}</small></div><button class="btn secondary" onclick="delProduct('${i.id}')">Eliminar</button></div>`).join("")||"<p>No hay productos.</p>";let gl=$("#galleryList");if(gl)gl.innerHTML=state.gallery.map(i=>`<div class="item">${i.video_url?`<video src="${i.video_url}"></video>`:`<img src="${i.media_url||i.after_url||i.before_url||'/logo-pata-y-aleta.png'}">`}<div><b>${i.title}</b><small>${i.type} · ${i.published?'Publicado':'Oculto'}</small></div><button class="btn secondary" onclick="delGallery('${i.id}')">Eliminar</button></div>`).join("")||"<p>No hay galería.</p>";let pv=$("#previewProducts");if(pv)pv.innerHTML=state.products.filter(x=>x.published).map(productCard).join("")}
function productCard(p){let label=p.show_price?(p.price_label||`$${p.price||0} MXN`):(p.price_label||"Cotizar");return `<div class="product">${p.video_url?`<video src="${p.video_url}" controls poster="${p.image_url||''}"></video>`:`<img src="${p.image_url||'/logo-pata-y-aleta.png'}">`}<div><span class="pill">${catLabel(p.category)}</span><h3>${p.title}</h3><p>${p.description||''}</p><p class="price">${label}</p><a class="btn full" target="_blank" href="${wa('Hola Pata y Aleta, quiero cotizar: '+p.title)}">Cotizar por WhatsApp</a></div></div>`}
function previewUI(){setTimeout(()=>loadData(true),50);return `<div><h2>Vista de catálogo publicado</h2><div id="previewProducts" class="productgrid"></div></div>`}
init();
</script>
</body></html>
